<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Psicológica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .view-tabs {
            display: flex;
            justify-content: center;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .view-tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .view-tab.active {
            background: white;
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }

        .view-content {
            display: none;
            padding: 30px;
        }

        .view-content.active {
            display: block;
        }

        .appointment-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 1px;
            background: #dee2e6;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
        }

        .time-slot {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: #666;
            border-right: 1px solid #dee2e6;
        }

        .appointment-slot {
            background: white;
            padding: 15px;
            min-height: 60px;
            position: relative;
        }

        .appointment {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            position: relative;
        }

        .appointment-time {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .appointment-patient {
            font-size: 14px;
            opacity: 0.9;
        }

        .appointment-notes {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .week-grid, .month-grid {
            display: grid;
            gap: 20px;
        }

        .day-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #dee2e6;
        }

        .day-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .view-tabs {
                flex-wrap: wrap;
            }

            .view-tab {
                padding: 10px 20px;
                font-size: 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .schedule-grid {
                grid-template-columns: 60px 1fr;
            }

            .time-slot {
                padding: 10px 5px;
                font-size: 14px;
            }

            .appointment-slot {
                padding: 10px;
                min-height: 50px;
            }

            .month-grid {
                grid-template-columns: 1fr;
            }
        }

        .empty-slot {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agenda Psicológica</h1>
            <p>Sistema de Gerenciamento de Consultas</p>
        </header>

        <div class="view-tabs">
            <button class="view-tab active" onclick="showView('daily')">Diário</button>
            <button class="view-tab" onclick="showView('weekly')">Semanal</button>
            <button class="view-tab" onclick="showView('monthly')">Mensal</button>
        </div>

        <div id="daily" class="view-content active">
            <div class="appointment-form">
                <h2>Adicionar Nova Consulta</h2>
                <form id="appointmentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Data</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Horário</label>
                            <input type="time" id="time" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="duration">Duração (minutos)</label>
                            <select id="duration">
                                <option value="30">30 minutos</option>
                                <option value="45">45 minutos</option>
                                <option value="60" selected>60 minutos</option>
                                <option value="90">90 minutos</option>
                                <option value="120">120 minutos</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="patientName">Nome do Paciente</label>
                            <input type="text" id="patientName" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="patientRecord">Prontuário do Paciente</label>
                        <textarea id="patientRecord" rows="4" placeholder="Descreva informações relevantes sobre o paciente..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Adicionar Consulta</button>
                </form>
            </div>

            <h2>Agenda de Hoje</h2>
            <div id="dailySchedule" class="schedule-grid">
            </div>
        </div>

        <div id="weekly" class="view-content">
            <h2>Agenda Semanal</h2>
            <div id="weeklySchedule" class="week-grid">
            </div>
        </div>

        <div id="monthly" class="view-content">
            <h2>Agenda Mensal</h2>
            <div id="monthlySchedule" class="month-grid">
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeDeleteModal()">&times;</button>
            <h2>Confirmar Exclusão</h2>
            <p>Tem certeza que deseja excluir esta consulta?</p>
            <div style="margin-top: 20px;">
                <button class="btn btn-danger" onclick="confirmDelete()">Excluir</button>
                <button class="btn" style="margin-left: 10px; background: #6c757d; color: white;" onclick="closeDeleteModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let appointments = JSON.parse(localStorage.getItem('appointments')) || [];
        let deleteId = null;

        function showView(viewName) {
            document.querySelectorAll('.view-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.view-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(viewName).classList.add('active');
            
            if (viewName === 'daily') {
                renderDailySchedule();
            } else if (viewName === 'weekly') {
                renderWeeklySchedule();
            } else if (viewName === 'monthly') {
                renderMonthlySchedule();
            }
        }

        function generateTimeSlots() {
            const slots = [];
            for (let hour = 0; hour < 24; hour++) {
                for (let minute = 0; minute < 60; minute += 30) {
                    const time = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                    slots.push(time);
                }
            }
            return slots;
        }

        function renderDailySchedule() {
            const scheduleDiv = document.getElementById('dailySchedule');
            const today = new Date().toISOString().split('T')[0];
            const timeSlots = generateTimeSlots();
            
            let html = '';
            timeSlots.forEach(time => {
                html += `<div class="time-slot">${time}</div>`;
                html += '<div class="appointment-slot">';
                
                const dayAppointments = appointments.filter(apt => apt.date === today);
                const slotAppointments = dayAppointments.filter(apt => {
                    const aptTime = apt.time;
                    const [aptHour, aptMinute] = aptTime.split(':').map(Number);
                    const [slotHour, slotMinute] = time.split(':').map(Number);
                    const duration = parseInt(apt.duration);
                    
                    const aptStartMinutes = aptHour * 60 + aptMinute;
                    const aptEndMinutes = aptStartMinutes + duration;
                    const slotMinutes = slotHour * 60 + slotMinute;
                    
                    return slotMinutes >= aptStartMinutes && slotMinutes < aptEndMinutes;
                });
                
                if (slotAppointments.length > 0) {
                    slotAppointments.forEach(apt => {
                        html += `
                            <div class="appointment">
                                <button class="delete-btn" onclick="showDeleteModal('${apt.id}')">&times;</button>
                                <div class="appointment-time">${apt.time} - ${apt.duration}min</div>
                                <div class="appointment-paciente">${apt.patientName}</div>
                                ${apt.patientRecord ? `<div class="appointment-notes">${apt.patientRecord.substring(0, 50)}...</div>` : ''}
                            </div>
                        `;
                    });
                } else {
                    html += '<div class="empty-slot">Livre</div>';
                }
                
                html += '</div>';
            });
            
            scheduleDiv.innerHTML = html;
        }

        function renderWeeklySchedule() {
            const scheduleDiv = document.getElementById('weeklySchedule');
            const today = new Date();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());
            
            let html = '';
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'numeric' });
                
                const dayAppointments = appointments.filter(apt => apt.date === dateStr);
                
                html += `
                    <div class="day-card">
                        <h3>${dayName}</h3>
                        ${dayAppointments.length > 0 ? 
                            dayAppointments.map(apt => `
                                <div class="appointment" style="margin-bottom: 10px;">
                                    <button class="delete-btn" onclick="showDeleteModal('${apt.id}')">&times;</button>
                                    <div class="appointment-time">${apt.time} - ${apt.duration}min</div>
                                    <div class="appointment-paciente">${apt.patientName}</div>
                                    ${apt.patientRecord ? `<div class="appointment-notes">${apt.patientRecord.substring(0, 50)}...</div>` : ''}
                                </div>
                            `).join('') :
                            '<div class="empty-slot">Nenhuma consulta</div>'
                        }
                    </div>
                `;
            }
            
            scheduleDiv.innerHTML = html;
        }

        function renderMonthlySchedule() {
            const scheduleDiv = document.getElementById('monthlySchedule');
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = '';
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'numeric' });
                
                const dayAppointments = appointments.filter(apt => apt.date === dateStr);
                
                html += `
                    <div class="day-card">
                        <h3>${dayName}</h3>
                        ${dayAppointments.length > 0 ? 
                            dayAppointments.map(apt => `
                                <div class="appointment" style="margin-bottom: 10px;">
                                    <button class="delete-btn" onclick="showDeleteModal('${apt.id}')">&times;</button>
                                    <div class="appointment-time">${apt.time} - ${apt.duration}min</div>
                                    <div class="appointment-paciente">${apt.patientName}</div>
                                    ${apt.patientRecord ? `<div class="appointment-notes">${apt.patientRecord.substring(0, 50)}...</div>` : ''}
                                </div>
                            `).join('') :
                            '<div class="empty-slot">Nenhuma consulta</div>'
                        }
                    </div>
                `;
            }
            
            scheduleDiv.innerHTML = html;
        }

        function showDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').style.display = 'block';
        }

        function closeDeleteModal() {
            deleteId = null;
            document.getElementById('deleteModal').style.display = 'none';
        }

        function confirmDelete() {
            if (deleteId) {
                appointments = appointments.filter(apt => apt.id !== deleteId);
                localStorage.setItem('appointments', JSON.stringify(appointments));
                closeDeleteModal();
                renderDailySchedule();
                renderWeeklySchedule();
                renderMonthlySchedule();
            }
        }

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const appointment = {
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                duration: document.getElementById('duration').value,
                patientName: document.getElementById('patientName').value,
                patientRecord: document.getElementById('patientRecord').value
            };
            
            appointments.push(appointment);
            localStorage.setItem('appointments', JSON.stringify(appointments));
            
            this.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            
            renderDailySchedule();
            renderWeeklySchedule();
            renderMonthlySchedule();
        });

        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        renderDailySchedule();
        renderWeeklySchedule();
        renderMonthlySchedule();
    </script>
</body>
</html>
